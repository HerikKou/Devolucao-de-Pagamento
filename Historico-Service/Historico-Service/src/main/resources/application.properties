spring.application.name=Historico-Service
spring.datasource.url=jdbc:postgresql://localhost:5432/Historico
spring.datasource.username=
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.datadog.metrics.export.apiKey =
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
spring.kafka.consumer.group-id=historico-service-group-v1
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.value.default.type=Service.Historico.DTO.ExplicacaoGerada

spring.kafka.consumer.properties.spring.json.value.type.mappings=Service.Analista.DTO.ExplicacaoGerada:Service.Historico.DTO.ExplicacaoGerada

spring.kafka.consumer.properties.spring.json.trusted.packages=Service.Historico.DTO.ExplicacaoGerada
spring.kafka.consumer.properties.spring.json.use.type.headers=false

logging.level.org.springframework.kafka=INFO
logging.level.comconsumerNotificacao=DEBUG

server.port=8087

